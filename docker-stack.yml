version: '3.8'

networks:
  private-network:
    driver: overlay

volumes:
  postgres-data:

secrets:                          # ← 1. declarar as secrets globalmente
  db_password:
    external: true
  db_username:
    external: true
  db_database:
    external: true

services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password   # ← 2. usar _FILE
      - POSTGRES_USER_FILE=/run/secrets/db_username
      - POSTGRES_DB_FILE=/run/secrets/db_database
    secrets:                      # ← 3. montar as secrets no serviço
      - db_password
      - db_username
      - db_database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  node:
    image: prova_segundo_bimestre_node:latest
    env_file:
      - .env
    networks:
      - private-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  nginx:
    image: prova_segundo_bimestre_nginx:latest
    ports:
      - "80:80"
    networks:
      - private-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s