version: '3.8'

networks:
  private-network:
    driver: overlay

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD=/run/secrets/db_password
      - POSTGRES_USER=/run/secrets/db_username
      - POSTGRES_DB=/run/secrets/db_database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  node:
    image: prova_segundo_bimestre_node:latest
    env_file:
      - .env
    networks:
      - private-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  nginx:
    image: prova_segundo_bimestre_nginx:latest
    ports:
      - "80:80"
    networks:
      - private-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s