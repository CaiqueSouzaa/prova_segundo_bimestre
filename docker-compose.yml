networks:
  private-network:

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:17
    networks:
      - private-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE}

  node:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - private-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    networks:
      - private-network
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node

  # O SEU CONTAINER EFÊMERO AQUI:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - private-network
    restart: "no" # Garante que ele não vai reiniciar após rodar o comando
    profiles: [ "tools" ] # Evita que ele suba junto com o "docker compose up" padrão
